    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc" stop-opacity=".94"/><stop offset="1" stop-color="#ffffff" stop-opacity=".78"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset=".52" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/><animate attributeName="x1" values="0;-.35;0" dur="11s" repeatCount="indefinite"/><animate attributeName="x2" values="1;1.35;1" dur="11s" repeatCount="indefinite"/></linearGradient>
